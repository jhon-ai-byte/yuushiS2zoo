<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Backstage♡Pass — 유우시와의 비밀 연애</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gaegu:wght@300;400;700&family=Black+Han+Sans&family=Dongle:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-50: #fff5f7;
    --pink-100: #ffe4ec;
    --pink-200: #ffc9d9;
    --pink-300: #ffa8c0;
    --pink-400: #ff85a6;
    --pink-500: #ff5f8a;
    --pink-600: #e63f72;
    --cream:   #fff8f0;
    --ink:     #2a1a2e;
    --ink-soft:#5a4258;
    --gold:    #ffd36e;
    --lav:     #c9b8ff;
    --mint:    #b8f0d9;
    --sky:     #a8d8ff;
    --shadow-soft: 0 10px 40px rgba(255,95,138,.18);
    --shadow-pop:  0 6px 0 #2a1a2e;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Gowun Batang', serif;
    color: var(--ink);
    background: #1a0f22;
    overflow-x: hidden;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phone {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    max-height: 920px;
    background: linear-gradient(180deg, var(--pink-50) 0%, #fff 40%, var(--pink-100) 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 80px rgba(255,95,138,.3);
  }
  @media (min-width: 500px) {
    .phone {
      border-radius: 42px;
      border: 10px solid #2a1a2e;
      height: 92vh;
    }
  }

  .phone::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,168,192,.35), transparent 30%),
      radial-gradient(circle at 90% 80%, rgba(201,184,255,.3), transparent 35%),
      radial-gradient(circle at 50% 50%, rgba(255,211,110,.12), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .sparkle-bg {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background-image:
      radial-gradient(1px 1px at 20% 15%, #fff 50%, transparent),
      radial-gradient(1px 1px at 80% 40%, #ffd36e 50%, transparent),
      radial-gradient(1.5px 1.5px at 40% 70%, #ff85a6 50%, transparent),
      radial-gradient(1px 1px at 70% 85%, #fff 50%, transparent),
      radial-gradient(1px 1px at 15% 90%, #c9b8ff 50%, transparent);
    opacity: .6;
    animation: sparkle 3s ease-in-out infinite;
  }
  @keyframes sparkle {
    0%, 100% { opacity: .3; }
    50% { opacity: .8; }
  }

  .screen {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .screen.hidden { display: none; }

  /* ===== 타이틀 화면 ===== */
  #screen-title {
    justify-content: center;
    align-items: center;
    text-align: center;
    background:
      radial-gradient(ellipse at top, rgba(255,168,192,.5), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(201,184,255,.4), transparent 60%),
      linear-gradient(180deg, var(--pink-100), var(--cream));
  }
  .title-logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 52px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -2px;
    text-shadow: 4px 4px 0 var(--pink-300), 8px 8px 0 rgba(0,0,0,.08);
    transform: rotate(-3deg);
    margin-bottom: 4px;
  }
  .title-sub {
    font-family: 'Gaegu', cursive;
    font-size: 22px;
    color: var(--pink-600);
    font-weight: 700;
    margin-top: 8px;
    transform: rotate(1deg);
  }
  .title-desc {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 20px 20px;
    line-height: 1.8;
  }
  .title-hero {
    width: 200px; height: 240px;
    border-radius: 50% / 45%;
    overflow: hidden;
    border: 4px solid #fff;
    box-shadow: var(--shadow-soft), 0 0 0 8px var(--pink-200);
    margin: 10px auto 16px;
    position: relative;
    animation: floaty 3s ease-in-out infinite;
    background: linear-gradient(135deg, var(--pink-100), var(--pink-200));
  }
  .title-hero img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center 25%;
  }
  .title-hero::after {
    content: '♡';
    position: absolute; top: -10px; right: -10px;
    font-size: 40px; color: var(--pink-500);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  .btn-start {
    margin-top: 14px;
    padding: 16px 48px;
    background: var(--pink-500);
    color: #fff;
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 24px;
    border: none;
    border-radius: 50px;
    box-shadow: var(--shadow-pop);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: 1px;
  }
  .btn-start:active {
    transform: translate(3px,3px);
    box-shadow: 0 3px 0 var(--ink);
  }
  .title-menu {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mini-btn {
    background: #fff;
    border: 2px solid var(--ink);
    color: var(--ink);
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 20px;
    box-shadow: 2px 2px 0 var(--ink);
    cursor: pointer;
    transition: all .15s;
  }
  .mini-btn:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--ink); }
  .mini-btn.disabled { opacity: .4; pointer-events: none; }
  .title-credit {
    margin-top: 16px;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: .7;
  }

  /* ===== 게임 HUD ===== */
  .hud {
    position: relative;
    z-index: 20;
    padding: 10px 16px 6px;
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(10px);
    border-bottom: 2px dashed var(--pink-300);
    flex-shrink: 0;
  }
  .hud-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .status-badge {
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 13px;
    padding: 3px 11px;
    background: var(--pink-500);
    color: #fff;
    border-radius: 20px;
    box-shadow: 0 2px 0 var(--ink);
    white-space: nowrap;
  }
  .day-info {
    font-family: 'Gaegu', cursive;
    font-size: 12px;
    color: var(--ink-soft);
    flex: 1;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hud-controls {
    display: flex;
    gap: 4px;
  }
  .hud-icon-btn {
    width: 28px; height: 28px;
    border: 2px solid var(--ink);
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    box-shadow: 0 2px 0 var(--ink);
  }
  .hud-icon-btn:active { transform: translateY(2px); box-shadow: none; }
  .hud-icon-btn.off { opacity: .4; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 10px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
  }
  .stat-label {
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    min-width: 42px;
    font-size: 11px;
    color: var(--ink);
  }
  .stat-bar {
    flex: 1;
    height: 7px;
    background: #ffe4ec;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--ink);
  }
  .stat-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .stat-fill::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .stat-fill.affection { background: linear-gradient(90deg, #ff85a6, #ff5f8a); }
  .stat-fill.trust     { background: linear-gradient(90deg, #a8d8ff, #6bb4ff); }
  .stat-fill.flutter   { background: linear-gradient(90deg, #ffd36e, #ff9f5f); }
  .stat-fill.secret    { background: linear-gradient(90deg, #c9b8ff, #9b7bff); }
  .stat-fill.jealousy  { background: linear-gradient(90deg, #ff6b6b, #b0004c); }
  .stat-val {
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 10px;
    min-width: 20px;
    text-align: right;
    color: var(--ink);
  }
  .jealousy-row {
    grid-column: span 2;
    background: rgba(255,107,107,.1);
    border-radius: 6px;
    padding: 2px 6px;
    margin-top: 2px;
  }

  /* ===== 씬 영역 ===== */
  .scene {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 18px 20px;
    gap: 12px;
    overflow-y: auto;
    position: relative;
    z-index: 15;
  }
  .scene-header {
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 14px;
    color: var(--pink-600);
    background: #fff;
    display: inline-block;
    padding: 4px 14px;
    border-radius: 16px;
    align-self: flex-start;
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    transform: rotate(-1deg);
  }

  /* ===== 이미지 카드 (개선) ===== */
  .img-card {
    position: relative;
    width: 100%;
    border-radius: 24px;
    overflow: hidden;
    border: 4px solid #fff;
    box-shadow: var(--shadow-soft), 0 0 0 3px var(--ink);
    background:
      linear-gradient(135deg, rgba(255,168,192,.3), rgba(201,184,255,.3)),
      linear-gradient(180deg, var(--pink-100), var(--pink-50));
    display: flex;
    align-items: center;
    justify-content: center;
    /* 화면 높이 기반 최대 크기 - 사진 전체가 보이도록 */
    max-height: min(52vh, 420px);
    min-height: 280px;
    transition: box-shadow .4s;
  }
  .img-card img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: filter .5s, transform .5s;
  }
  /* 무드별 필터만 적용 (크롭 X) */
  .img-card.mood-sad img,
  .img-card.mood-conflict img { filter: saturate(.55) brightness(.88) contrast(.95); }
  .img-card.mood-angry img    { filter: contrast(1.12) saturate(1.1) brightness(.92); }
  .img-card.mood-flutter      { box-shadow: var(--shadow-soft), 0 0 0 3px var(--ink), 0 0 40px var(--pink-400); }
  .img-card.mood-flutter::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(255,168,192,.4));
    pointer-events: none;
    z-index: 2;
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: .6; }
    50% { opacity: 1; }
  }
  .img-card.mood-serious::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(42,26,46,.5));
    pointer-events: none;
    z-index: 2;
  }

  .img-tag {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(42,26,46,.88);
    color: #ffd36e;
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    backdrop-filter: blur(6px);
    max-width: calc(100% - 24px);
    z-index: 3;
    line-height: 1.3;
  }
  .img-hearts {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 3;
  }
  .floating-heart {
    position: absolute;
    font-size: 24px;
    color: var(--pink-500);
    animation: float-up 2s ease-out forwards;
    text-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  @keyframes float-up {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    20% { transform: translateY(-30px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-200px) scale(.5); opacity: 0; }
  }

  /* ===== 대사 ===== */
  .dialogue {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 20px 20px 20px 4px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.6;
    position: relative;
    box-shadow: 4px 4px 0 var(--ink);
    animation: slideIn .4s ease-out;
    min-height: 28px;
  }
  .dialogue.yuushi::before {
    content: '유우시';
    position: absolute;
    top: -14px; left: 14px;
    background: var(--pink-500);
    color: #fff;
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 13px;
    padding: 2px 12px;
    border-radius: 12px;
    border: 2px solid var(--ink);
  }
  .dialogue.narration {
    background: var(--cream);
    border-style: dashed;
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    box-shadow: none;
  }
  .dialogue.monologue {
    background: rgba(201,184,255,.2);
    border: 2px dashed var(--lav);
    font-size: 13px;
    color: #5a4680;
    font-style: italic;
    box-shadow: none;
  }
  .dialogue.monologue::before {
    content: '💭 주현의 속마음';
    position: absolute;
    top: -12px; left: 12px;
    background: var(--lav);
    color: var(--ink);
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    border: 2px solid var(--ink);
  }
  .typing::after {
    content: '▋';
    color: var(--pink-500);
    animation: blink 0.8s infinite;
    font-weight: 700;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes slideIn {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ===== 선택지 ===== */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 6px;
  }
  .choice-btn {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    font-family: 'Gowun Batang', serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    transition: all .15s;
    position: relative;
    animation: slideIn .4s ease-out backwards;
  }
  .choice-btn:nth-child(1) { animation-delay: .1s; }
  .choice-btn:nth-child(2) { animation-delay: .2s; }
  .choice-btn:nth-child(3) { animation-delay: .3s; }
  .choice-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .choice-btn.trick {
    background: linear-gradient(135deg, #fff, var(--pink-50));
    border-color: var(--pink-600);
  }
  .choice-btn.trick::after {
    content: '🎲';
    position: absolute;
    top: -10px; right: 8px;
    font-size: 16px;
    background: var(--gold);
    padding: 2px 5px;
    border-radius: 50%;
    border: 2px solid var(--ink);
  }
  .choice-letter {
    font-family: 'Black Han Sans', sans-serif;
    color: var(--pink-500);
    font-size: 16px;
    margin-right: 6px;
  }

  /* ===== 수치 변화 플로팅 ===== */
  .stat-popup {
    position: fixed;
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 16px;
    pointer-events: none;
    z-index: 999;
    animation: statPop 1.4s ease-out forwards;
    text-shadow: 1px 1px 0 var(--ink);
  }
  .stat-popup.plus  { color: #ff5f8a; }
  .stat-popup.minus { color: #6b6b6b; }
  .stat-popup.jeal  { color: #b0004c; }
  @keyframes statPop {
    0% { transform: translateY(0) scale(.8); opacity: 0; }
    20% { transform: translateY(-10px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-60px) scale(1); opacity: 0; }
  }

  .result-text {
    font-family: 'Gaegu', cursive;
    font-size: 14px;
    color: var(--pink-600);
    text-align: center;
    padding: 8px;
    background: var(--pink-50);
    border-radius: 12px;
    border: 2px dashed var(--pink-300);
    animation: slideIn .5s ease-out;
  }

  .next-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 30px;
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    align-self: center;
    box-shadow: 0 4px 0 #000, var(--shadow-soft);
    transition: all .15s;
    letter-spacing: 1px;
  }
  .next-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #000;
  }
  .skip-btn {
    background: transparent;
    border: 1px dashed var(--ink-soft);
    color: var(--ink-soft);
    font-family: 'Gaegu', cursive;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    align-self: center;
    cursor: pointer;
    margin-top: -4px;
  }

  /* ===== 엔딩 ===== */
  #screen-ending {
    background:
      radial-gradient(ellipse at center, rgba(255,168,192,.6), transparent 70%),
      linear-gradient(180deg, #2a1a2e, #5a2a4a 60%, var(--pink-400));
    color: #fff;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }
  #screen-ending.ending-miss {
    background: linear-gradient(180deg, #1a1a2e, #3a2a4a);
  }
  #screen-ending.ending-hidden {
    background:
      radial-gradient(ellipse at center, rgba(255,211,110,.3), transparent 70%),
      linear-gradient(180deg, #0a0a1a, #2a1a3e 70%, #5a3a6a);
  }
  .ending-type {
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .ending-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 34px;
    color: #fff;
    text-shadow: 3px 3px 0 var(--pink-600), 6px 6px 0 rgba(0,0,0,.3);
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 16px;
    padding: 0 10px;
  }
  .ending-img {
    width: 220px;
    height: 300px;
    border-radius: 24px;
    overflow: hidden;
    border: 4px solid var(--gold);
    box-shadow: 0 0 40px rgba(255,211,110,.5);
    margin: 8px auto 16px;
    background: linear-gradient(135deg, #2a1a2e, #5a2a4a);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ending-img img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
  }
  .ending-quote {
    font-size: 15px;
    line-height: 1.8;
    color: #fff;
    background: rgba(255,255,255,.1);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,.3);
    border-radius: 20px;
    padding: 14px 16px;
    margin: 8px 0 14px;
    max-width: 340px;
  }
  .ending-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 14px;
  }
  .ending-stat-chip {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.4);
    padding: 5px 11px;
    border-radius: 20px;
    font-family: 'Gaegu', cursive;
    font-size: 12px;
  }
  .ending-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 6px;
  }
  .restart-btn {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--ink);
  }
  .restart-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--ink); }
  .restart-btn.secondary {
    background: #fff;
    font-size: 15px;
    padding: 10px 20px;
  }

  /* ===== 트랜지션 ===== */
  .flash {
    position: fixed; inset: 0;
    background: #fff;
    z-index: 9999;
    pointer-events: none;
    animation: flashFade .6s ease-out forwards;
  }
  @keyframes flashFade {
    0% { opacity: 0.8; }
    100% { opacity: 0; }
  }
  .darken {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 9999;
    pointer-events: none;
    animation: darkFade 1.2s ease-out forwards;
  }
  @keyframes darkFade {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  .shake {
    animation: shake .4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .screen::-webkit-scrollbar, .scene::-webkit-scrollbar { width: 4px; }
  .screen::-webkit-scrollbar-thumb, .scene::-webkit-scrollbar-thumb {
    background: var(--pink-300); border-radius: 4px;
  }

  .event-toast {
    position: absolute;
    top: 120px; left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--ink);
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 30px;
    border: 3px solid var(--ink);
    box-shadow: 0 6px 0 var(--ink);
    z-index: 100;
    animation: toastIn 2.8s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes toastIn {
    0% { transform: translate(-50%, -40px); opacity: 0; }
    15%, 85% { transform: translate(-50%, 0); opacity: 1; }
    100% { transform: translate(-50%, -20px); opacity: 0; }
  }

  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 3px;
    padding: 6px 0 2px;
    flex-wrap: wrap;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ffc9d9;
    transition: all .3s;
  }
  .dot.done { background: var(--pink-500); }
  .dot.current { background: var(--ink); transform: scale(1.6); }

  /* ===== 모달 ===== */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn .2s;
  }
  @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
  .modal {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 20px;
    max-width: 360px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow-pop);
  }
  .modal h3 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    margin: 0 0 12px;
    color: var(--pink-600);
  }
  .modal-close {
    position: absolute;
    top: 10px; right: 14px;
    background: var(--ink);
    color: #fff;
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .gallery-item {
    background: var(--pink-50);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    font-family: 'Gaegu', cursive;
    font-size: 12px;
    line-height: 1.3;
    position: relative;
    overflow: hidden;
  }
  .gallery-item.locked {
    opacity: .35;
    background: #eee;
  }
  .gallery-item.locked::after {
    content: '🔒';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
  }
  .gallery-item .g-type {
    font-size: 10px;
    color: var(--pink-600);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .gallery-item .g-title {
    font-weight: 700;
    font-size: 14px;
    margin-top: 4px;
    color: var(--ink);
  }
  .log-entry {
    font-family: 'Gaegu', cursive;
    font-size: 13px;
    padding: 8px 10px;
    border-bottom: 1px dashed var(--pink-300);
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .log-entry b { color: var(--pink-600); }

  .route-hint {
    font-family: 'Gaegu', cursive;
    font-size: 11px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 4px;
    opacity: .7;
  }
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="sparkle-bg"></div>

  <!-- ===== 타이틀 ===== -->
  <div class="screen" id="screen-title">
    <div class="title-logo">Backstage</div>
    <div class="title-logo" style="transform: rotate(2deg); color: var(--pink-600); text-shadow: 4px 4px 0 var(--gold), 8px 8px 0 rgba(0,0,0,.08);">♡Pass</div>
    <div class="title-sub">유우시와의 비밀 연애</div>
    <div class="title-hero">
      <img id="titleImg" alt="" />
    </div>
    <div class="title-desc">
      소속사 인턴 매니저로 들어간 첫날.<br/>
      장비 창고에 단둘이 갇힌 그 순간부터…<br/>
      <b style="color: var(--pink-600)">당신의 아이돌 러브스토리가 시작됩니다.</b>
    </div>
    <button class="btn-start" onclick="startGame(false)">START ♡</button>
    <div class="title-menu">
      <button class="mini-btn" id="btnContinue" onclick="startGame(true)">이어하기</button>
      <button class="mini-btn" onclick="openGallery()">엔딩 갤러리</button>
      <button class="mini-btn" onclick="toggleBGM()" id="btnBGM">🎵 BGM OFF</button>
    </div>
    <div class="title-credit">※ 본 게임은 허구의 캐릭터를 다루는 시뮬레이션입니다</div>
  </div>

  <!-- ===== 게임 화면 ===== -->
  <div class="screen hidden" id="screen-game" style="padding: 0;">
    <div class="hud">
      <div class="hud-top">
        <div class="status-badge" id="relStatus">어색함</div>
        <div class="day-info" id="dayInfo">Day 1</div>
        <div class="hud-controls">
          <button class="hud-icon-btn" onclick="openLog()" title="로그">📜</button>
          <button class="hud-icon-btn" onclick="saveGame(true)" title="저장">💾</button>
          <button class="hud-icon-btn" onclick="confirmQuit()" title="나가기">✕</button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-row">
          <span class="stat-label">호감도</span>
          <div class="stat-bar"><div class="stat-fill affection" id="bar-aff" style="width:20%"></div></div>
          <span class="stat-val" id="val-aff">20</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">신뢰도</span>
          <div class="stat-bar"><div class="stat-fill trust" id="bar-tru" style="width:15%"></div></div>
          <span class="stat-val" id="val-tru">15</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">설렘도</span>
          <div class="stat-bar"><div class="stat-fill flutter" id="bar-flu" style="width:10%"></div></div>
          <span class="stat-val" id="val-flu">10</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">비밀공유</span>
          <div class="stat-bar"><div class="stat-fill secret" id="bar-sec" style="width:5%"></div></div>
          <span class="stat-val" id="val-sec">5</span>
        </div>
        <div class="stat-row jealousy-row">
          <span class="stat-label" style="color:#b0004c">질투💢</span>
          <div class="stat-bar"><div class="stat-fill jealousy" id="bar-jea" style="width:0%"></div></div>
          <span class="stat-val" id="val-jea">0</span>
        </div>
      </div>
      <div class="progress-dots" id="progressDots"></div>
    </div>
    <div class="scene" id="scene"></div>
  </div>

  <!-- ===== 엔딩 ===== -->
  <div class="screen hidden" id="screen-ending">
    <div class="ending-type" id="endType">ENDING</div>
    <div class="ending-title" id="endTitle">-</div>
    <div class="ending-img"><img id="endImg" /></div>
    <div class="ending-quote" id="endQuote">-</div>
    <div class="ending-stats" id="endStats"></div>
    <div class="route-hint" id="routeHint"></div>
    <div class="ending-actions">
      <button class="restart-btn" onclick="resetGame()">다시 플레이 ♡</button>
      <button class="restart-btn secondary" onclick="openGallery()">갤러리 보기</button>
    </div>
  </div>

  <!-- 모달 컨테이너 -->
  <div id="modalContainer"></div>
</div>

function getRelationshipStage() {
  if (state.aff >= 70 && state.flu >= 60) return "late";
  if (state.aff >= 40) return "mid";
  return "early";
}
function pickImage(scene, mood) {
  const stage = getRelationshipStage();
  const key = scene.imgKey;
  const map = {
    flutter_close: { early: "img_1399", mid: "img_1399", late: "img_1393" },
    practice_shy:  { early: "img_1394", mid: "img_1394", late: "img_1393" },
    stage_serious: { early: "img_1398", mid: "img_1398", late: "img_1398" },
    car_casual:    { early: "img_1395", mid: "img_1395", late: "img_1395" },
    street_walk:   { early: "img_1393", mid: "img_1393", late: "img_1393" },
    comic_grape:   { early: "img_1396", mid: "img_1396", late: "img_1396" },
    roof_phone:    { early: "img_1392", mid: "img_1392", late: "img_1392" },

/* ============================================================
   BGM (Web Audio API) - 부드러운 패드 사운드
   ============================================================ */
let audioCtx = null;
let bgmOn = false;
let bgmNodes = [];
function toggleBGM() {
  bgmOn = !bgmOn;
  const btn = document.getElementById("btnBGM");
  if (bgmOn) {
    startBGM();
    if (btn) btn.textContent = "🎵 BGM ON";
  } else {
    stopBGM();
    if (btn) btn.textContent = "🎵 BGM OFF";
  }
}
function startBGM() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    stopBGM();
    // 간단한 앰비언트 패드: 3개의 사인파
    const freqs = [261.63, 329.63, 392.00]; // C E G
    const master = audioCtx.createGain();
    master.gain.value = 0.05;
    master.connect(audioCtx.destination);
    freqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = f;
      const g = audioCtx.createGain();
      g.gain.value = 0;
      g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 2);
      // LFO로 볼륨을 부드럽게 흔들어서 몽환적인 느낌
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.1 + i * 0.05;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.15;
      lfo.connect(lfoGain);
      lfoGain.connect(g.gain);
      lfo.start();
      osc.connect(g);
      g.connect(master);
      osc.start();
      bgmNodes.push(osc, lfo);
    });
    bgmNodes.push(master);
  } catch(e) { console.warn("BGM 실패", e); }
}
function stopBGM() {
  bgmNodes.forEach(n => { try { if (n.stop) n.stop(); else n.disconnect(); } catch(e) {} });
  bgmNodes = [];
}
function playChime(type) {
  if (!audioCtx || !bgmOn) return;
  try {
    const freq = type === "good" ? 880 : type === "bad" ? 220 : 523;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type === "bad" ? "sawtooth" : "triangle";
    osc.frequency.value = freq;
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.6);
  } catch(e) {}
}

function updateHUD() {
  const clamp = v => Math.max(0, Math.min(100, v));
  state.aff = clamp(state.aff); state.tru = clamp(state.tru);
  state.flu = clamp(state.flu); state.sec = clamp(state.sec);
  state.jea = clamp(state.jea);

  const bars = {aff:"bar-aff",tru:"bar-tru",flu:"bar-flu",sec:"bar-sec",jea:"bar-jea"};
  for (const [k,id] of Object.entries(bars)) {
    document.getElementById(id).style.width = state[k] + "%";
    document.getElementById("val-"+k.slice(0,3)).textContent = state[k];
  }

  let status = "어색함";
  if (state.aff >= 80 && state.flu >= 70) status = "비밀연애♡";
  else if (state.aff >= 60 && state.flu >= 50) status = "썸";
  else if (state.aff >= 40) status = "친한 사이";
  else if (state.jea >= 50) status = "묘한 기류";
  else if (state.tru <= 20 && state.sceneIdx >= 3) status = "서먹해짐";
  document.getElementById("relStatus").textContent = status;

  const dots = document.getElementById("progressDots");
  dots.innerHTML = "";
  for (let i = 0; i < scenes.length; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i < state.sceneIdx ? " done" : i === state.sceneIdx ? " current" : "");
    dots.appendChild(d);
  }
}

function showStatPopup(key, val) {
  const labels = {aff:"호감도",tru:"신뢰도",flu:"설렘도",sec:"비밀공유",jea:"질투💢"};
  const el = document.createElement("div");
  el.className = "stat-popup " + (key === "jea" ? "jeal" : val > 0 ? "plus" : "minus");
  el.textContent = (val > 0 ? "+" : "") + val + " " + labels[key];
  const targetBar = document.getElementById("bar-" + key.slice(0,3));

}

function showToast(msg) {

  t.className = "event-toast";
  t.textContent = msg;
  document.getElementById("phone").appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function spawnHearts(container) {
  for (let i = 0; i < 6; i++) {
    const h = document.createElement("div");
    h.className = "floating-heart";
    h.textContent = ["♡","♥","💗","✨"][i % 4];

/* ============================================================
   타자기 효과
   ============================================================ */
let typingTimer = null;
let typingSkip = false;
function typeText(el, text, speed = 30, cb = null) {
  typingSkip = false;
  el.textContent = "";
  el.classList.add("typing");
  let i = 0;
  if (typingTimer) clearInterval(typingTimer);
  typingTimer = setInterval(() => {
    if (typingSkip) {
      el.textContent = text;
      el.classList.remove("typing");
      clearInterval(typingTimer);
      typingTimer = null;
      if (cb) cb();
      return;
    }
    if (i < text.length) {
      el.textContent += text[i];
      i++;
    } else {
      el.classList.remove("typing");
      clearInterval(typingTimer);
      typingTimer = null;
      if (cb) cb();
    }
  }, speed);
}

function renderScene() {
  const scene = scenes[state.sceneIdx];
  const sceneEl = document.getElementById("scene");
  sceneEl.innerHTML = "";
  document.getElementById("dayInfo").textContent = scene.header;

  // 씬 헤더
  const header = document.createElement("div");
  header.className = "scene-header";
  header.textContent = "[" + scene.header + "]";
  sceneEl.appendChild(header);

  // 이미지 카드
  const imgKey = pickImage(scene, scene.mood);
  const card = document.createElement("div");
  card.className = "img-card mood-" + scene.mood;
  card.innerHTML = `<img src="${IMG[imgKey]}" alt="scene" />
                    <div class="img-tag">🎬 ${scene.imgTag}</div>
                    <div class="img-hearts"></div>`;
  sceneEl.appendChild(card);

  // 내레이션 (타자기 효과)
  if (scene.narration) {
    const n = document.createElement("div");
    n.className = "dialogue narration";
    sceneEl.appendChild(n);
    typeText(n, scene.narration, 20, () => {
      // 이어서 대사
      showDialogueAndChoices(scene, sceneEl);
    });
    addSkipBtn(sceneEl);
  } else {
    showDialogueAndChoices(scene, sceneEl);
  }

  updateHUD();
  sceneEl.scrollTop = 0;
}

function addSkipBtn(sceneEl) {
  const skip = document.createElement("button");
  skip.className = "skip-btn";
  skip.textContent = "≫ 빨리 넘기기";
  skip.onclick = () => { typingSkip = true; skip.remove(); };
  sceneEl.appendChild(skip);
}

function showDialogueAndChoices(scene, sceneEl) {
  // skip-btn 제거
  const sb = sceneEl.querySelector(".skip-btn");
  if (sb) sb.remove();

  // 유우시 대사
  const d = document.createElement("div");
  d.className = "dialogue yuushi";
  d.style.marginTop = "16px";
  sceneEl.appendChild(d);
  typeText(d, "「 " + scene.dialogue + " 」", 35, () => {
    // 선택지 등장
    const choicesEl = document.createElement("div");
    choicesEl.className = "choices";
    scene.choices.forEach((ch, idx) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn" + (ch.trick ? " trick" : "");
      btn.innerHTML = `<span class="choice-letter">${String.fromCharCode(65+idx)}.</span>${ch.text}`;
      btn.onclick = () => pickChoice(idx);
      choicesEl.appendChild(btn);
    });
    sceneEl.appendChild(choicesEl);
    sceneEl.scrollTop = sceneEl.scrollHeight;
  });
  addSkipBtn(sceneEl);
}

/* ============================================================
   선택 처리
   ============================================================ */
function pickChoice(idx) {
  const scene = scenes[state.sceneIdx];
  const choice = scene.choices[idx];

  // 수치 반영
  const eff = choice.effects;
  for (const k of ["aff","tru","flu","sec","jea"]) {
    if (eff[k]) {
      state[k] += eff[k];
      showStatPopup(k, eff[k]);
    }
  }
  if (choice.trick) state.trickCount++;
  if (eff._flag === "avoidedConfession") state.avoidedConfession = true;
  if (eff._flag === "acceptedConfession") state.acceptedConfession = true;
  if (eff._flag === "chose_snsHonest") state.chose_snsHonest = true;

  // 로그 저장
  state.log.push({
    scene: scene.header,
    choice: String.fromCharCode(65+idx) + ". " + choice.text,
    monologue: choice.monologue,
    reaction: choice.reaction
  });

  // 연출
  const isGood = (eff.flu && eff.flu > 0) || (eff.aff && eff.aff >= 5);
  const isBad = eff.aff && eff.aff < 0;
  if (isGood) {
    const card = document.querySelector(".img-card .img-hearts");
    if (card) spawnHearts(card);
    const flash = document.createElement("div");
    flash.className = "flash";
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 600);
    playChime("good");
  } else if (isBad) {
    const dark = document.createElement("div");
    dark.className = "darken";
    document.body.appendChild(dark);
    setTimeout(() => dark.remove(), 1200);
    const card = document.querySelector(".img-card");
    if (card) {
      card.classList.add("shake");
      setTimeout(() => card.classList.remove("shake"), 400);
    }
    playChime("bad");
  } else {
    playChime("neutral");
  }

  checkEventTriggers();

  document.querySelectorAll(".choice-btn").forEach(b => {
    b.disabled = true;
    b.style.opacity = .5;
  });

  updateHUD();

  // 자동 저장
  saveGame(false);

  setTimeout(() => {
    const sceneEl = document.getElementById("scene");

    // 내면 독백 (주현의 속마음)
    if (choice.monologue) {
      const mono = document.createElement("div");
      mono.className = "dialogue monologue";
      mono.style.marginTop = "18px";
      sceneEl.appendChild(mono);
      typeText(mono, choice.monologue, 25, () => {
        showReaction(choice, sceneEl, eff);
      });
    } else {
      showReaction(choice, sceneEl, eff);
    }
  }, 700);
}

function showReaction(choice, sceneEl, eff) {
  // 유우시 리액션
  const reactBox = document.createElement("div");
  reactBox.className = "dialogue yuushi";
  reactBox.style.marginTop = "14px";
  sceneEl.appendChild(reactBox);
  sceneEl.scrollTop = sceneEl.scrollHeight;

  typeText(reactBox, "「 " + choice.reaction + " 」", 30, () => {
    // 수치 요약
    const summary = document.createElement("div");
    summary.className = "result-text";
    const parts = [];
    if (eff.aff) parts.push(`호감 ${eff.aff>0?"+":""}${eff.aff}`);
    if (eff.tru) parts.push(`신뢰 ${eff.tru>0?"+":""}${eff.tru}`);
    if (eff.flu) parts.push(`설렘 ${eff.flu>0?"+":""}${eff.flu}`);
    if (eff.sec) parts.push(`비밀 ${eff.sec>0?"+":""}${eff.sec}`);
    if (eff.jea) parts.push(`질투 +${eff.jea}`);
    summary.textContent = parts.join(" · ");
    sceneEl.appendChild(summary);

    const nextBtn = document.createElement("button");
    nextBtn.className = "next-btn";
    nextBtn.textContent = state.sceneIdx < scenes.length - 1 ? "다음 ➤" : "엔딩 보기 ♡";
    nextBtn.onclick = goNext;
    sceneEl.appendChild(nextBtn);
    sceneEl.scrollTop = sceneEl.scrollHeight;
  });
}

function checkEventTriggers() {
  const ev = state.triggeredEvents;
  const add = (id, msg) => {
    if (!ev.includes(id)) { ev.push(id); showToast(msg); }
  };
  if (state.aff >= 60) add("night", "🌙 이벤트: 밤 연습실 단둘이!");
  if (state.flu >= 70) add("hand", "✋ 이벤트: 손 잡기!");
  if (state.tru <= 30 && state.sceneIdx >= 3) add("sns", "📱 이벤트: SNS 오해 사건!");
  if (state.jea >= 50) add("jealous", "💢 이벤트: 돌발 감정 폭발!");
  if (state.sec >= 80) add("invite", "🔐 이벤트: 숙소 비밀 초대!");
  if (state.trickCount >= 3) add("trick", "🎲 트릭 3회 달성! (히든 루트 진입 가능)");
}

function goNext() {
  state.sceneIdx++;
  if (state.sceneIdx >= scenes.length) {
    showEnding();
  } else {
    renderScene();
    saveGame(false);
  }
}

/* ============================================================
   엔딩
   ============================================================ */
function determineEnding() {
  // 히든: 트릭 3+ & 질투 60+ & 비밀 70+ & 고백 회피
  if (state.trickCount >= 3 && state.jea >= 60 && state.sec >= 70 && state.avoidedConfession) {
    return "hidden";
  }
  // 공개 연애
  if (state.aff >= 85 && state.flu >= 75 && state.tru >= 60 && state.acceptedConfession) {
    return "love";
  }
  // 비밀 연애
  if (state.sec >= 80 && state.tru >= 60) return "secret";
  // 엇갈림
  if (state.tru <= 30) return "miss";
  // 친구
  if (state.aff >= 70 && state.flu <= 45) return "friend";
  // 기본 분기
  if (state.aff >= 70 && state.flu >= 55) return "love";
  if (state.aff >= 55) return "secret";
  if (state.tru >= 55) return "friend";
  return "miss";
}

/* ============================================================
   저장/불러오기
   ============================================================ */
function saveGame(notify) {
  try {
    localStorage.setItem("bpSave", JSON.stringify({
      state, timestamp: Date.now()
    }));
    if (notify) showToast("💾 저장 완료!");
    updateContinueButton();
  } catch(e) { console.warn(e); }
}
function loadGame() {
  try {
    const raw = localStorage.getItem("bpSave");
    if (!raw) return false;
    const data = JSON.parse(raw);
    // 기본 필드 보정 (구버전 세이브 호환)
    state = Object.assign(structuredClone(DEFAULT_STATE), data.state);
    if (!state.log) state.log = [];
    if (!Array.isArray(state.triggeredEvents)) state.triggeredEvents = [];
    return true;
  } catch(e) { return false; }
}
function hasSave() {
  return !!localStorage.getItem("bpSave");
}
function updateContinueButton() {
  const btn = document.getElementById("btnContinue");
  if (!btn) return;
  if (hasSave()) btn.classList.remove("disabled");
  else btn.classList.add("disabled");
}

/* ============================================================
   모달 (로그 / 갤러리 / 확인)
   ============================================================ */
function openModal(innerHTML) {
  const c = document.getElementById("modalContainer");
  c.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      ${innerHTML}
    </div></div>`;
}
function closeModal() {
  document.getElementById("modalContainer").innerHTML = "";
}
function openLog() {
  let html = `<h3>📜 선택 로그</h3>`;
  if (state.log.length === 0) {
    html += `<p style="font-family:'Gaegu',cursive;color:var(--ink-soft)">아직 선택한 내용이 없어요.</p>`;
  } else {
    state.log.forEach(l => {
      html += `<div class="log-entry">
        <b>${l.scene}</b><br/>
        → ${l.choice}<br/>
        <span style="color:#5a4680;font-style:italic">💭 ${l.monologue}</span><br/>
        <span style="color:var(--pink-600)">♡ ${l.reaction}</span>
      </div>`;
    });
  }
  openModal(html);
}
function openGallery() {
  const unlocked = JSON.parse(localStorage.getItem("bpUnlocked") || "[]");
  let html = `<h3>🏆 엔딩 갤러리</h3>
    <p style="font-family:'Gaegu',cursive;font-size:13px;color:var(--ink-soft);margin-bottom:12px">
      ${unlocked.length} / 5 엔딩 달성
    </p>
    <div class="gallery-grid">`;
  for (const k of ["love","secret","hidden","friend","miss"]) {
    const e = endings[k];
    const isUnlocked = unlocked.includes(k);
    html += `<div class="gallery-item ${isUnlocked ? "" : "locked"}">
      <div class="g-type">${isUnlocked ? e.type : "???"}</div>
      <div class="g-title">${isUnlocked ? e.title : "미달성"}</div>
      <div style="font-size:10px;margin-top:6px;color:var(--ink-soft)">
        ${isUnlocked ? e.hint : "조건을 달성하면 해금됩니다"}
      </div>
    </div>`;
  }
  html += `</div>`;
  openModal(html);
}
function confirmQuit() {
  openModal(`<h3>나가기</h3>
    <p style="font-family:'Gaegu',cursive;font-size:14px">
      정말 나가시겠어요?<br/>진행 상황은 자동 저장돼요.
    </p>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="mini-btn" onclick="closeModal()">취소</button>
      <button class="mini-btn" style="background:var(--pink-500);color:#fff" onclick="quitToTitle()">나가기</button>
    </div>`);
}
function quitToTitle() {
  saveGame(false);
  closeModal();
  document.getElementById("screen-game").classList.add("hidden");
  document.getElementById("screen-ending").classList.add("hidden");
  document.getElementById("screen-title").classList.remove("hidden");
  updateContinueButton();
}

/* ============================================================
   시작 / 리셋
   ============================================================ */
function startGame(continueSave) {
  if (continueSave) {
    if (!loadGame()) { showToast("저장된 게임이 없어요!"); return; }
  } else {
    state = structuredClone(DEFAULT_STATE);
    localStorage.removeItem("bpSave");
  }
  document.getElementById("screen-title").classList.add("hidden");
  document.getElementById("screen-ending").classList.add("hidden");
  document.getElementById("screen-game").classList.remove("hidden");
  renderScene();
}

function resetGame() {
  state = structuredClone(DEFAULT_STATE);
  localStorage.removeItem("bpSave");
  const endScreen = document.getElementById("screen-ending");
  endScreen.className = "screen hidden";
  document.getElementById("screen-title").classList.remove("hidden");
  updateContinueButton();
}

window.addEventListener("load", () => {
  document.getElementById("titleImg").src = IMG.img_1399;
  updateContinueButton();
});
</script>
</body>
</html>
